<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANSAB Industrial Monitor</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#1e3a8a', yellow: '#fbbf24', dark: '#111827' },
                        status: { on: '#10b981', off: '#9ca3af', warning: '#f59e0b', danger: '#ef4444' }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        
        .hub-ring { transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .no-jitter { backface-visibility: hidden; transform: translateZ(0); }
        @keyframes pulse-soft { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulse-soft 4s infinite ease-in-out; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "xlsx": "https://esm.sh/xlsx@^0.18.5"
  }
}
</script>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-[#1e3a8a] selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- DASHBOARD CONSTANTS ---
        const MW_TO_KW = 1000;
        const GENERATOR_CAPACITY_MW = 23;
        const STORAGE_KEY_EQUIPMENT = 'yansab_dashboard_equipment_v4';
        const STORAGE_KEY_GENERATORS = 'yansab_dashboard_generators_v4';
        const STORAGE_KEY_PARAMS = 'yansab_dashboard_params_v4';

        // --- ICONS (SVG Paths) ---
        const Icon = ({ path, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {path}
            </svg>
        );

        const Icons = {
            Zap: (props) => <Icon path={<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></>} {...props} />,
            TrendingUp: (props) => <Icon path={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></>} {...props} />,
            RotateCcw: (props) => <Icon path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></>} {...props} />,
            BarChart3: (props) => <Icon path={<><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></>} {...props} />,
            Check: (props) => <Icon path={<><polyline points="20 6 9 17 4 12" /></>} {...props} />,
            Activity: (props) => <Icon path={<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></>} {...props} />,
            Edit3: (props) => <Icon path={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} {...props} />,
            Search: (props) => <Icon path={<><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>} {...props} />,
            Monitor: (props) => <Icon path={<><rect width="20" height="14" x="2" y="3" rx="2" /><line x1="8" x2="16" y1="21" y2="21" /><line x1="12" x2="12" y1="17" y2="21" /></>} {...props} />,
            PlayCircle: (props) => <Icon path={<><circle cx="12" cy="12" r="10" /><polygon points="10 8 16 12 10 16 10 8" /></>} {...props} />,
            ChevronDown: (props) => <Icon path={<><polyline points="6 9 12 15 18 9" /></>} {...props} />,
            ChevronUp: (props) => <Icon path={<><polyline points="18 15 12 9 6 15" /></>} {...props} />,
            FolderInput: (props) => <Icon path={<><path d="M2 9h10v5L2 9Z" /><path d="M20 20h-7v-2.14" /><path d="M20 16.5v.35" /><path d="M22 13v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v2" /></>} {...props} />,
            StopCircle: (props) => <Icon path={<><circle cx="12" cy="12" r="10" /><rect width="6" height="6" x="9" y="9" /></>} {...props} />,
            AlertCircle: (props) => <Icon path={<><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></>} {...props} />,
            CheckCircle2: (props) => <Icon path={<><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>} {...props} />,
            XCircle: (props) => <Icon path={<><circle cx="12" cy="12" r="10" /><line x1="15" x2="9" y1="9" y2="15" /><line x1="9" x2="15" y1="9" y2="15" /></>} {...props} />,
            LayoutList: (props) => <Icon path={<><line x1="8" x2="21" y1="6" y2="6" /><line x1="8" x2="21" y1="12" y2="12" /><line x1="8" x2="21" y1="18" y2="18" /><line x1="3" x2="3.01" y1="6" y2="6" /><line x1="3" x2="3.01" y1="12" y2="12" /><line x1="3" x2="3.01" y1="18" y2="18" /></>} {...props} />,
            Filter: (props) => <Icon path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" /></>} {...props} />,
            Loader2: (props) => <Icon path={<><path d="M21 12a9 9 0 1 1-6.219-8.56" /></>} {...props} />,
            RefreshCw: (props) => <Icon path={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 21v-5h5" /></>} {...props} />,
            ArrowLeft: (props) => <Icon path={<><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></>} {...props} />
        };

        // --- DASHBOARD UTILS ---
        const parseExcelData = async (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = e.target?.result;
                        const workbook = XLSX.read(data, { type: 'array' });
                        const genSheet = workbook.SheetNames.find(n => n.toLowerCase().includes('generator'));
                        const eqSheet = workbook.SheetNames.find(n => n.toLowerCase().includes('equipment'));
                        const paramSheet = workbook.SheetNames.find(n => n.toLowerCase().includes('parameter') || n.toLowerCase().includes('setting'));
                        let generators = []; let equipment = []; let parameters = { averageEnergy: null, basePowerLoad: null };
                        if (genSheet) {
                            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[genSheet]);
                            generators = raw.map(r => ({ id: r.ID, name: r.Name, capacity_mw: Number(r.CapacityMW) || 0, current_mw: Number(r.CurrentMW) || 0 })).filter(g => g.id && g.name);
                        }
                        if (eqSheet) {
                            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[eqSheet]);
                            equipment = raw.map(r => ({ id: r.ID, plant: r.Plant, tag: r.Tag, name: r.Name, load: Number(r.LoadKW) || 0, status: (r.Status?.toUpperCase() === 'ON') ? 'ON' : 'OFF' })).filter(e => e.id && e.name);
                        }
                        if (paramSheet) {
                            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[paramSheet]);
                            raw.forEach(r => {
                                const k = r.Parameter?.toLowerCase().replace(/[^a-z]/g, '') || '';
                                if (k.includes('average') && k.includes('energy')) parameters.averageEnergy = Number(r.Value);
                                if (k.includes('base') && k.includes('load')) parameters.basePowerLoad = Number(r.Value);
                            });
                        }
                        resolve({ generators, equipment, parameters });
                    } catch (err) { reject(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // --- COMPONENTS ---

        const DashboardHeader = ({ onBack }) => (
            <header className="bg-white shadow-lg border-b-4 border-amber-400 sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center space-y-2 sm:space-y-0">
                    <div className="flex items-center space-x-6">
                        <button onClick={onBack} className="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-500 hover:text-slate-800" title="Back to Streams"><Icons.ArrowLeft className="h-6 w-6" /></button>
                        <div className="flex items-center space-x-3">
                            <div className="bg-blue-900 p-2 rounded-lg"><Icons.Activity className="h-6 w-6 text-white" /></div>
                            <div className="flex flex-col">
                                <h1 className="text-xl md:text-2xl font-bold text-blue-900 tracking-tight leading-tight">YANSAB <span className="text-slate-500 font-light">Energy Dashboard</span></h1>
                                <p className="text-[10px] sm:text-xs text-slate-400 font-bold uppercase tracking-[0.2em] mt-0.5">Stream 01 Performance</p>
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-col items-center sm:items-end gap-1">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Developed by</p>
                        <p className="text-sm text-slate-600 font-medium">Abdulaziz Alamri</p>
                    </div>
                </div>
            </header>
        );

        const KpiCard = ({ title, value, unit, variant = 'secondary', icon, note }) => {
            const isPrimary = variant === 'primary';
            return (
                <div className={`relative overflow-hidden rounded-xl shadow-md border border-slate-100 transition-all duration-300 hover:shadow-xl flex flex-col ${isPrimary ? "bg-blue-900 text-white" : "bg-white text-blue-900"}`}>
                    <div className="p-5 flex flex-col h-full relative z-10">
                        <div className="flex justify-between items-center w-full">
                            <h3 className={`text-xs font-bold uppercase tracking-wider ${isPrimary ? "text-blue-100" : "text-slate-500"}`}>{title}</h3>
                            {icon && <div className={isPrimary ? "text-blue-300" : "text-slate-400"}>{icon}</div>}
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center py-2">
                            <span className="text-4xl lg:text-5xl font-extrabold tracking-tight leading-tight">{typeof value === 'number' ? value.toLocaleString() : value}</span>
                            {unit && <span className={`text-sm font-semibold mt-1 uppercase tracking-wide ${isPrimary ? "text-blue-200" : "text-slate-400"}`}>{unit}</span>}
                        </div>
                        {note && <div className="mt-auto pt-1 text-center"><p className={`text-[10px] font-medium opacity-70 ${isPrimary ? "text-blue-100" : "text-slate-400"}`}>{note}</p></div>}
                    </div>
                    <div className={`absolute -bottom-6 -right-6 w-24 h-24 rounded-full opacity-10 ${isPrimary ? "bg-white" : "bg-blue-900"}`} />
                </div>
            );
        };

        const GaugeCard = ({ value }) => {
            const displayValue = Math.min(Math.max(value, 0), 100);
            const radius = 70; const centerX = 100; const centerY = 85; const strokeWidth = 18;
            const arcLength = Math.PI * radius;
            const rotation = -90 + (displayValue / 100) * 180;
            let textClass = value > 80 ? "text-emerald-500" : value >= 75 ? "text-amber-500" : "text-rose-500";
            return (
                <div className="bg-white rounded-xl shadow-md border border-slate-100 p-5 flex flex-col items-center justify-between hover:shadow-xl h-full relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-900 to-amber-400 opacity-50"></div>
                    <div className="w-full flex justify-between items-center mb-2 z-10">
                        <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider">Load Factor</h3>
                        <div className={`h-2.5 w-2.5 rounded-full ring-2 ring-offset-1 ring-slate-100 ${value > 80 ? 'bg-emerald-500' : value >= 75 ? 'bg-amber-500' : 'bg-rose-500'}`} />
                    </div>
                    <div className="flex-1 flex items-center justify-center w-full">
                        <div className="relative w-full max-w-[220px]">
                            <svg viewBox="0 0 200 105" className="w-full h-auto overflow-visible">
                                <defs><linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#ef4444" /><stop offset="50%" stopColor="#f59e0b" /><stop offset="100%" stopColor="#10b981" /></linearGradient></defs>
                                <path d={`M ${centerX - radius} ${centerY} A ${radius} ${radius} 0 0 1 ${centerX + radius} ${centerY}`} fill="none" stroke="#f1f5f9" strokeWidth={strokeWidth} strokeLinecap="round" />
                                <path d={`M ${centerX - radius} ${centerY} A ${radius} ${radius} 0 0 1 ${centerX + radius} ${centerY}`} fill="none" stroke="url(#gauge-gradient)" strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={arcLength} strokeDashoffset={arcLength * (1 - displayValue / 100)} className="transition-all duration-1000 ease-out" />
                                <g transform={`translate(${centerX}, ${centerY}) rotate(${rotation})`} className="transition-transform duration-1000 ease-out"><circle cx="0" cy="0" r="6" fill="#1e293b" /><path d={`M -2 0 L 0 ${-radius + 8} L 2 0 Z`} fill="#1e293b" /></g>
                            </svg>
                            <div className="absolute bottom-0 left-0 right-0 flex justify-center translate-y-6"><span className={`text-4xl font-bold ${textClass} tracking-tight`}>{value.toFixed(1)}%</span></div>
                        </div>
                    </div>
                    <div className="mt-4 z-10"><p className="text-[10px] font-medium text-slate-400 bg-slate-50 px-2 py-1 rounded-md border border-slate-100">Optimum Load Factor &gt; 80%</p></div>
                </div>
            );
        };

        const GeneratorRow = ({ gen, onSave, isReadOnly }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [tempValue, setTempValue] = useState(gen.current_mw.toString());
            const inputRef = useRef(null);
            useEffect(() => { if (isEditing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [isEditing]);
            const handleSave = () => {
                let val = parseFloat(tempValue); if (isNaN(val) || val < 0) val = 0; if (val > GENERATOR_CAPACITY_MW) val = GENERATOR_CAPACITY_MW;
                onSave(gen.id, val); setTempValue(val.toString()); setIsEditing(false);
            };
            const handleKeyDown = (e) => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') { setTempValue(gen.current_mw.toString()); setIsEditing(false); } };
            const isRunning = gen.current_mw > 0;
            return (
                <div className="flex items-center justify-between py-3 border-b border-slate-100 last:border-0 hover:bg-slate-50 px-2 rounded-md transition-colors">
                    <div className="flex items-center space-x-3">
                        <div className={`p-1.5 rounded-full ${isRunning ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}><Icons.Zap className="w-4 h-4" /></div>
                        <span className="text-sm font-medium text-slate-700">{gen.name}</span>
                    </div>
                    {isEditing && !isReadOnly ? (
                        <div className="flex items-center space-x-2">
                            <input ref={inputRef} type="number" min="0" max={GENERATOR_CAPACITY_MW} value={tempValue} onChange={(e) => setTempValue(e.target.value)} onBlur={handleSave} onKeyDown={handleKeyDown} className="w-20 px-2 py-1 text-right text-sm border border-blue-900 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            <span className="text-xs text-slate-500">MW</span>
                        </div>
                    ) : (
                        <button disabled={isReadOnly} onClick={() => { if (!isReadOnly) { setTempValue(gen.current_mw.toString()); setIsEditing(true); } }} className={`group flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${isRunning ? 'bg-emerald-500 text-white hover:bg-green-600' : 'bg-slate-200 text-slate-500'} ${isReadOnly ? 'cursor-default' : 'cursor-pointer'}`}>
                            <span>{isRunning ? `${gen.current_mw} MW` : 'OFFLINE'}</span>
                            {!isReadOnly && <Icons.Edit3 className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" />}
                        </button>
                    )}
                </div>
            );
        };

        const GeneratorsCard = ({ generators, onUpdateGenerator, totalMw, isReadOnly }) => (
            <div className="bg-white rounded-xl shadow-md border border-slate-100 p-6 hover:shadow-xl transition-all h-full flex flex-col">
                <div className="flex items-center space-x-2 mb-4"><Icons.CheckCircle2 className="w-4 h-4 text-slate-400" /><h3 className="text-sm font-medium text-slate-500 uppercase tracking-wider">Generation Status</h3></div>
                <div className="space-y-1 mb-4 flex-1">{generators.length > 0 ? generators.map(gen => <GeneratorRow key={gen.id} gen={gen} onSave={onUpdateGenerator} isReadOnly={isReadOnly} />) : <p className="text-xs text-slate-400 italic text-center py-4">No generators loaded</p>}</div>
                <div className="mt-auto pt-4 border-t border-slate-100 flex justify-between items-end"><span className="text-xs font-semibold text-slate-500 uppercase">Total Generation</span><span className="text-xl font-bold text-emerald-500">{totalMw.toLocaleString()} MW</span></div>
            </div>
        );

        const EquipmentTable = ({ data, onToggleStatus, isReadOnly }) => {
            const [filterText, setFilterText] = useState(''); const [statusFilter, setStatusFilter] = useState('ALL'); const [isTableExpanded, setIsTableExpanded] = useState(true); const [isFiltersExpanded, setIsFiltersExpanded] = useState(true);
            const counts = useMemo(() => ({ ALL: data.length, ON: data.filter(i => i.status === 'ON').length, OFF: data.filter(i => i.status === 'OFF').length }), [data]);
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    if (statusFilter !== 'ALL' && item.status !== statusFilter) return false;
                    const lower = filterText.toLowerCase().trim();
                    if (lower && !item.tag.toLowerCase().includes(lower) && !item.name.toLowerCase().includes(lower) && !item.plant.toLowerCase().includes(lower)) return false;
                    return true;
                });
            }, [data, filterText, statusFilter]);
            const isSearching = filterText.trim() !== '';
            return (
                <div className="bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden flex flex-col mt-8">
                    <div className="p-5 border-b border-slate-100 bg-slate-50/50 space-y-4">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center space-x-3">
                                <button onClick={() => setIsTableExpanded(!isTableExpanded)} className="p-1.5 hover:bg-slate-200 rounded-lg transition-colors text-slate-500">
                                    {isTableExpanded ? <Icons.ChevronUp className="w-5 h-5" /> : <Icons.ChevronDown className="w-5 h-5" />}
                                </button>
                                <div><h2 className="text-lg font-bold text-blue-900">Equipment Status</h2><p className="text-sm text-slate-500">{isReadOnly ? "Monitoring current load" : "Interactive simulation mode"}</p></div>
                            </div>
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="relative flex-1 md:w-72"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icons.Search className="h-4 w-4 text-slate-400" /></div><input type="text" placeholder="Search tag or service name..." className="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm shadow-sm" value={filterText} onChange={(e) => { setFilterText(e.target.value); if (e.target.value.trim() !== '') setIsTableExpanded(true); }} /></div>
                                <button onClick={() => setIsFiltersExpanded(!isFiltersExpanded)} className={`p-2 rounded-lg border transition-all ${isFiltersExpanded ? 'bg-blue-900 text-white border-blue-900' : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300'}`} title="Toggle Filters"><Icons.Filter className="w-4 h-4" /></button>
                            </div>
                        </div>
                        {isFiltersExpanded && (
                            <div className="flex flex-wrap gap-1 bg-slate-200/50 p-1 rounded-lg w-fit animate-fade-in">
                                <button onClick={() => setStatusFilter('ALL')} className={`flex items-center px-3 py-1.5 rounded-md text-sm font-medium transition-all ${statusFilter === 'ALL' ? 'bg-white text-blue-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>All <span className="ml-2 bg-slate-100 text-slate-600 px-1.5 rounded-full text-[10px]">{counts.ALL}</span></button>
                                <button onClick={() => setStatusFilter('ON')} className={`flex items-center px-3 py-1.5 rounded-md text-sm font-medium transition-all ${statusFilter === 'ON' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'}`}>Running <span className="ml-2 bg-slate-100 px-1.5 rounded-full text-[10px]">{counts.ON}</span></button>
                                <button onClick={() => setStatusFilter('OFF')} className={`flex items-center px-3 py-1.5 rounded-md text-sm font-medium transition-all ${statusFilter === 'OFF' ? 'bg-white text-slate-700 shadow-sm' : 'text-slate-500'}`}>Stopped <span className="ml-2 bg-slate-100 px-1.5 rounded-full text-[10px]">{counts.OFF}</span></button>
                            </div>
                        )}
                    </div>
                    {(isTableExpanded || isSearching) && (
                        <div className="overflow-x-auto border-t border-slate-100">
                            <table className="min-w-full divide-y divide-slate-200">
                                <thead className="bg-blue-900 text-white"><tr><th className="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider">Plant</th><th className="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider">Tag</th><th className="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider">Service</th><th className="px-6 py-3 text-right text-xs font-semibold uppercase tracking-wider">Load (KW)</th><th className="px-6 py-3 text-center text-xs font-semibold uppercase tracking-wider">Status</th></tr></thead>
                                <tbody className="bg-white divide-y divide-slate-200">{filteredData.length > 0 ? filteredData.map(item => <tr key={item.id} onClick={() => !isReadOnly && onToggleStatus(item.id)} className={`transition-colors group ${isReadOnly ? 'cursor-default' : 'cursor-pointer hover:bg-blue-50/50'}`}><td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-medium">{item.plant}</td><td className="px-6 py-4 whitespace-nowrap text-sm font-mono font-bold text-blue-900 tracking-tight">{item.tag}</td><td className="px-6 py-4 text-sm text-slate-600 truncate max-w-xs">{item.name}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-right font-black text-slate-700">{item.load.toLocaleString()}</td><td className="px-6 py-4 whitespace-nowrap text-center"><span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold border ${item.status === 'ON' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>{item.status}</span></td></tr>) : <tr><td colSpan={5} className="px-6 py-12 text-center text-slate-400 italic">No matching equipment found.</td></tr>}</tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        const FileUploader = ({ onFileUpload }) => {
            const [isUploading, setIsUploading] = useState(false); const [isSyncing, setIsSyncing] = useState(false); const [error, setError] = useState(null); const fileHandleRef = useRef(null); const intervalRef = useRef(null); const lastModifiedRef = useRef(0);
            const stopSync = () => { if (intervalRef.current) clearInterval(intervalRef.current); intervalRef.current = null; fileHandleRef.current = null; setIsSyncing(false); };
            const startLiveSync = async () => {
                setError(null);
                try {
                    const [handle] = await window.showOpenFilePicker({ types: [{ accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }], multiple: false });
                    fileHandleRef.current = handle; const file = await handle.getFile(); setIsSyncing(true); lastModifiedRef.current = file.lastModified; setIsUploading(true); await onFileUpload(file, false); setIsUploading(false);
                    intervalRef.current = setInterval(async () => {
                        try { const currentFile = await fileHandleRef.current.getFile(); if (currentFile.lastModified > lastModifiedRef.current) { lastModifiedRef.current = currentFile.lastModified; await onFileUpload(currentFile, true); } } catch { stopSync(); setError("Lost access to file."); }
                    }, 2000);
                } catch { setError("Live Sync error."); setIsSyncing(false); }
            };
            return (
                <div className="flex flex-col items-end gap-1">
                    {isSyncing ? <button onClick={stopSync} className="flex items-center px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg text-sm animate-pulse"><Icons.StopCircle className="w-4 h-4 mr-2" /> Stop Sync</button> : <button onClick={startLiveSync} className="flex items-center px-4 py-2 bg-blue-900 text-white rounded-lg text-sm shadow-sm"><Icons.FolderInput className="w-4 h-4 mr-2" /> Live Sync Excel</button>}
                    <p className="text-[10px] text-slate-400">{error ? error : "System requires Live Sync to load data"}</p>
                </div>
            );
        };

        const EnergyDashboard = ({ onBack }) => {
            const [mode, setMode] = useState('live'); const [showSavedToast, setShowSavedToast] = useState(false);
            const [equipmentData, setEquipmentData] = useState(() => { const s = localStorage.getItem(STORAGE_KEY_EQUIPMENT); return s ? JSON.parse(s) : []; });
            const [generatorData, setGeneratorData] = useState(() => { const s = localStorage.getItem(STORAGE_KEY_GENERATORS); return s ? JSON.parse(s) : []; });
            const [dashboardParams, setDashboardParams] = useState(() => { const s = localStorage.getItem(STORAGE_KEY_PARAMS); return s ? JSON.parse(s) : { averageEnergy: 0, basePowerLoad: 0 }; });
            const [simEquipment, setSimEquipment] = useState([]); const [simGenerators, setSimGenerators] = useState([]); const [simParams, setSimParams] = useState({ averageEnergy: 0, basePowerLoad: 0 });
            useEffect(() => { if (mode === 'simulator' && simEquipment.length === 0) { setSimEquipment(JSON.parse(JSON.stringify(equipmentData))); setSimGenerators(JSON.parse(JSON.stringify(generatorData))); setSimParams({ ...dashboardParams }); } }, [mode]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY_EQUIPMENT, JSON.stringify(equipmentData)); localStorage.setItem(STORAGE_KEY_GENERATORS, JSON.stringify(generatorData)); localStorage.setItem(STORAGE_KEY_PARAMS, JSON.stringify(dashboardParams)); }, [equipmentData, generatorData, dashboardParams]);
            const current = mode === 'live' ? { equipment: equipmentData, generators: generatorData, params: dashboardParams } : { equipment: simEquipment, generators: simGenerators, params: simParams };
            const metrics = useMemo(() => {
                const totalGenMW = current.generators.reduce((sum, gen) => sum + gen.current_mw, 0); const grossLoad = current.equipment.reduce((sum, item) => sum + (item.status === 'ON' ? item.load : 0), 0) + current.params.basePowerLoad;
                const demand = Math.max(0, grossLoad - (totalGenMW * MW_TO_KW)); return { totalGenMW, grossLoad, loadFactor: demand > 0 ? (current.params.averageEnergy / demand) * 100 : 0 };
            }, [current]);
            const handleExcelUpload = async (file, silent = false) => {
                const { generators, equipment, parameters } = await parseExcelData(file);
                if (generators.length > 0) setGeneratorData(generators); if (equipment.length > 0) setEquipmentData(equipment);
                if (parameters.averageEnergy !== null || parameters.basePowerLoad !== null) setDashboardParams(prev => ({ averageEnergy: parameters.averageEnergy ?? prev.averageEnergy, basePowerLoad: parameters.basePowerLoad ?? prev.basePowerLoad }));
                if (!silent) { setShowSavedToast(true); setTimeout(() => setShowSavedToast(false), 2000); }
            };
            return (
                <div className="min-h-screen pb-12 bg-slate-50 w-full animate-fade-in relative no-scrollbar">
                    <DashboardHeader onBack={onBack} />
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        <div className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-200 pb-6">
                            <h2 className="text-2xl font-black text-slate-900 flex items-center"><Icons.BarChart3 className="w-6 h-6 mr-3 text-blue-900" /> Energy Overview</h2>
                            <div className="bg-slate-200 p-1.5 rounded-2xl flex items-center shadow-inner">
                                <button onClick={() => setMode('live')} className={`flex items-center px-8 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'live' ? 'bg-white text-blue-900 shadow-lg' : 'text-slate-500'}`}>Live {mode === 'live' && <span className="ml-2 w-2 h-2 bg-emerald-500 rounded-full animate-pulse" />}</button>
                                <button onClick={() => setMode('simulator')} className={`flex items-center px-8 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'simulator' ? 'bg-white text-blue-900 shadow-lg' : 'text-slate-500'}`}>Simulator</button>
                            </div>
                        </div>
                        <div className="mb-8 flex flex-col lg:flex-row lg:justify-between lg:items-center gap-6">
                            <div><span className={`text-[11px] font-black px-4 py-1.5 rounded-full border tracking-widest uppercase shadow-sm ${mode === 'live' ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-purple-100 text-purple-700 border-purple-200'}`}>{mode === 'live' ? 'Continuous Monitoring' : 'Simulation active'}</span></div>
                            <div className="flex flex-col sm:flex-row gap-4 sm:items-center"><FileUploader onFileUpload={handleExcelUpload} /></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
                            <KpiCard title="Average Energy" value={current.params.averageEnergy} unit="KWH" variant="primary" icon={<Icons.Zap className="w-6 h-6" />} note="System Baseline" />
                            <KpiCard title="Peak Demand" value={metrics.grossLoad} unit="KWH" icon={<Icons.TrendingUp className="w-6 h-6" />} note={`Inc. Base: ${current.params.basePowerLoad}`} />
                            <GaugeCard value={metrics.loadFactor} /><GeneratorsCard generators={current.generators} onUpdateGenerator={(id, val) => setSimGenerators(prev => prev.map(g => g.id === id ? { ...g, current_mw: val } : g))} totalMw={metrics.totalGenMW} isReadOnly={mode === 'live'} />
                        </div>
                        <EquipmentTable data={current.equipment} onToggleStatus={(id) => setSimEquipment(prev => prev.map(i => i.id === id ? { ...i, status: i.status === 'ON' ? 'OFF' : 'ON' } : i))} isReadOnly={mode === 'live'} />
                    </main>
                    {showSavedToast && <div className="fixed bottom-6 right-6 z-50 animate-fade-in"><div className="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 text-sm font-bold"><Icons.Check className="w-5 h-5 text-emerald-400" /><span>System Data Updated</span></div></div>}
                </div>
            );
        };

        // --- OVERVIEW COMPONENTS ---

        const STREAMS_DATA = [
            { id: 1, label: "ELECTRICAL", color: "#3B82F6", target: 'ELECTRICAL_DASHBOARD' },
            { id: 2, label: "NITROGEN", color: "#FACC15" },
            { id: 3, label: "AIR", color: "#94A3B8" },
            { id: 4, label: "WATER", color: "#94A3B8" },
            { id: 5, label: "STEAM", color: "#94A3B8" }
        ];

        const OverviewPentagon = ({ stream, onClick, size = 180 }) => {
            const points = "50,5 95,38 78,92 22,92 5,38";
            return (
                <div 
                    onClick={() => onClick(stream)}
                    className={`relative flex items-center justify-center transition-transform duration-700 hover:scale-110 group no-jitter ${stream.target ? 'cursor-pointer' : 'cursor-default opacity-80'}`}
                    style={{ width: size, height: size }}
                >
                    <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full drop-shadow-[0_4px_12px_rgba(0,0,0,0.03)]">
                        <polygon points={points} fill="white" stroke={stream.color} strokeWidth="1.2" className="transition-all duration-700 group-hover:stroke-width-[2.5px]" />
                    </svg>
                    <div className="relative z-10 flex flex-col items-center justify-center text-center p-4">
                        <div className="flex flex-col items-center gap-1">
                            <span className="text-[11px] font-bold tracking-[0.15em] transition-colors duration-500 leading-tight" style={{ color: stream.color }}>{stream.label}</span>
                            <span className="text-[8px] font-medium tracking-[0.3em] text-slate-400 uppercase opacity-60">STREAM</span>
                        </div>
                        <div className="w-1.5 h-1.5 rounded-full mt-4 opacity-20 transition-all duration-500 group-hover:opacity-100 group-hover:scale-150" style={{ backgroundColor: stream.color }} />
                    </div>
                </div>
            );
        };

        const Overview = ({ onNavigate }) => {
            const angles = [0, 72, 144, 216, 288];
            const radius = 290;
            return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-8 animate-fade-in overflow-hidden">
                    <div className="w-full max-w-5xl aspect-square flex items-center justify-center relative">
                        <div className="relative w-full h-full flex items-center justify-center">
                            <div className="absolute flex items-center justify-center pointer-events-none z-0">
                                <div className="w-[400px] h-[400px] border border-slate-50 rounded-full flex items-center justify-center hub-ring">
                                    <div className="w-[330px] h-[330px] border border-slate-100 rounded-full flex items-center justify-center hub-ring">
                                        <div className="w-[250px] h-[250px] border border-slate-200 rounded-full flex items-center justify-center bg-white shadow-[inset_0_2px_10px_rgba(0,0,0,0.015)] hub-ring">
                                            <h2 className="text-2xl font-light tracking-[1em] text-slate-400 uppercase select-none mr-[-1em] no-jitter">STREAMS</h2>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {angles.map((angle, i) => {
                                const stream = STREAMS_DATA[i]; if (!stream) return null;
                                const x = Math.sin((angle * Math.PI) / 180) * radius; const y = -Math.cos((angle * Math.PI) / 180) * radius;
                                return <div key={stream.id} className="absolute flex items-center justify-center transition-all duration-1000 z-10" style={{ transform: `translate(${x}px, ${y}px)` }}><OverviewPentagon stream={stream} onClick={(s) => s.target && onNavigate(s.target)} /></div>;
                            })}
                        </div>
                    </div>
                    <div className="mt-12 flex flex-col items-center space-y-4">
                        <p className="text-slate-300 text-[9px] font-bold uppercase tracking-[0.7em] animate-pulse-soft select-none">YANSAB Operational Stream Overview</p>
                        <div className="h-[1px] w-12 bg-slate-100 rounded-full" />
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [view, setView] = useState('OVERVIEW');
            return view === 'OVERVIEW' ? <Overview onNavigate={setView} /> : <EnergyDashboard onBack={() => setView('OVERVIEW')} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
